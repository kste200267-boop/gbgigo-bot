<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>경북기계금속고 안내봇 | 무엇이든 물어보세요</title>
<meta name="description" content="경북기계금속고등학교 안내 챗봇 — 학과·입학·취업·복지를 선택형으로 바로 안내합니다." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#070b14;--bg2:#0c1220;--panel:#0f1828;--panel2:#13203a;--line:#1d2c47;
    --cyan:#22e1ff;--blue:#3b82f6;--green:#34f5a0;--txt:#e6f0ff;--muted:#8aa0c0;--dim:#5b6f90;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--txt);
    min-height:100vh;display:flex;flex-direction:column;align-items:center}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(34,225,255,.12), transparent 60%),
      radial-gradient(700px 500px at 0% 20%, rgba(59,130,246,.12), transparent 55%),
      linear-gradient(rgba(34,225,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,225,255,.035) 1px, transparent 1px);
    background-size:auto,auto,42px 42px,42px 42px;}
  a{color:var(--cyan)}

  .page{position:relative;z-index:1;width:100%;max-width:560px;padding:24px 16px 40px;
    display:flex;flex-direction:column;min-height:100vh}

  /* 상단 타이틀 */
  .topbar{text-align:center;margin-bottom:16px}
  .topbar .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--cyan);
    border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:rgba(34,225,255,.06);letter-spacing:.5px}
  .topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:800;font-size:22px;margin-top:12px;
    background:linear-gradient(120deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .topbar p{color:var(--muted);font-size:13px;margin-top:4px}

  /* 채팅 카드 */
  .chat{flex:1;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:20px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--bg2));box-shadow:0 18px 60px rgba(0,0,0,.5)}
  .chat-head{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--panel2);border-bottom:1px solid var(--line)}
  .ava{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:23px;
    background:linear-gradient(120deg,var(--cyan),var(--blue));box-shadow:0 0 18px rgba(34,225,255,.4)}
  .hinfo b{display:block;color:#fff;font-size:15px}
  .hinfo span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .online{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .reset{margin-left:auto;font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:6px 11px;cursor:pointer;font-family:inherit}
  .reset:hover{color:var(--cyan);border-color:var(--cyan)}

  .body{flex:1;min-height:380px;max-height:58vh;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;
    background:radial-gradient(600px 300px at 100% 0%, rgba(34,225,255,.05), transparent 60%),var(--bg)}
  .body::-webkit-scrollbar{width:8px}.body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  .msg{max-width:82%;padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.65;
    animation:pop .22s ease;white-space:pre-line;word-break:break-word}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.bot{align-self:flex-start;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-top-left-radius:5px}
  .msg.user{align-self:flex-end;color:#04121c;font-weight:500;border-top-right-radius:5px;
    background:linear-gradient(120deg,var(--cyan),var(--blue))}
  .msg.bot b{color:var(--cyan)} .msg a{color:var(--cyan);font-weight:600}
  .msg-img{display:block;width:100%;max-width:320px;border-radius:12px;margin-top:9px;
    border:1px solid var(--line);cursor:zoom-in}
  .stamp{display:block;font-size:10px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}
  .typing{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:16px;
    border-top-left-radius:5px;padding:14px 16px;display:flex;gap:5px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* 선택 버튼 영역 */
  .choices{padding:12px 14px;border-top:1px solid var(--line);background:var(--panel);
    display:flex;flex-wrap:wrap;gap:9px;align-content:flex-start}
  .label{width:100%;font-size:11.5px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:2px}
  .chip{font-size:13.5px;color:var(--txt);border:1px solid var(--line);background:var(--bg);
    border-radius:12px;padding:10px 14px;cursor:pointer;transition:.15s;font-family:inherit;text-align:left}
  .chip:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
  .chip.cat{background:rgba(34,225,255,.06)}
  .chip.back{color:var(--muted);background:transparent}
  .chip.back:hover{color:#fff;border-color:var(--muted)}

  /* 직접 입력창 */
  .ask{display:flex;gap:10px;padding:14px;border-top:1px solid var(--line);background:var(--panel2)}
  .ask input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:12px;color:var(--txt);
    padding:13px 16px;font-size:14.5px;font-family:inherit;outline:none}
  .ask input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,225,255,.12)}
  .ask button{width:50px;border:none;border-radius:12px;cursor:pointer;font-size:18px;color:#04121c;
    background:linear-gradient(120deg,var(--cyan),var(--blue));box-shadow:0 0 18px rgba(34,225,255,.35);transition:.15s}
  .ask button:hover{transform:scale(1.05)}

  footer{position:relative;z-index:1;color:var(--dim);font-size:12px;text-align:center;padding:18px 16px 0;line-height:1.7}
  footer a{color:var(--muted)}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <span class="tag">⚙ 경북기계금속고 · 스마트제조 협약형 특성화고</span>
    <h1>학교 안내봇 '기금이'</h1>
    <p>궁금한 유형을 고르면 바로 답해드려요 — 로그인·앱 설치 필요 없음</p>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="ava">🤖</div>
      <div class="hinfo"><b>기금이 봇</b><span><i class="online"></i> 보통 즉시 응답</span></div>
      <button class="reset" id="resetBtn">↺ 처음으로</button>
    </div>
    <div class="body" id="body"></div>
    <div class="choices" id="choices"></div>
    <form class="ask" id="askForm" autocomplete="off">
      <input id="askInput" type="text" placeholder="직접 입력해서 물어보기  (예: 기숙사 무료야?)" />
      <button type="submit" aria-label="전송">➤</button>
    </form>
  </div>

  <footer>
    공개 자료 기반 비공식 안내봇입니다. 정확한 전형·입학 정보는<br>
    학교 ☎ 053-859-3800 · <a href="https://gbgigo.com" target="_blank">gbgigo.com</a> 에서 확인하세요.
  </footer>
</div>

<script src="kb.js"></script>
<script src="kb-loader.js"></script>
<script src="neis.js"></script>
<script>
const body = document.getElementById('body');
const choices = document.getElementById('choices');
const resetBtn = document.getElementById('resetBtn');

function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');}
function scroll(){body.scrollTop=body.scrollHeight;}

function addMsg(html, who){
  const m=document.createElement('div');
  m.className='msg '+who;
  m.innerHTML=html+`<span class="stamp">${now()}</span>`;
  body.appendChild(m); scroll();
}
function typing(cb){
  const t=document.createElement('div');
  t.className='typing'; t.innerHTML='<i></i><i></i><i></i>';
  body.appendChild(t); scroll();
  setTimeout(()=>{ t.remove(); cb(); }, 420+Math.random()*380);
}
function clearChoices(){ choices.innerHTML=''; }
function addLabel(txt){ const l=document.createElement('div'); l.className='label'; l.textContent=txt; choices.appendChild(l); }
function addChip(txt, cls, fn){
  const c=document.createElement('button'); c.className='chip '+(cls||''); c.innerHTML=txt; c.onclick=fn;
  choices.appendChild(c);
}

/* 답변 내 특수 마커 처리: [[IMG:파일]] = 사진,  [[MEAL]] = 실시간 급식 */
function processImgs(html){
  return html.replace(/\[\[IMG:([^\]]+)\]\]/g, (m,f)=>
    `<img class="msg-img" src="img/${f.trim()}" alt="학교 사진" loading="lazy" onclick="window.open(this.src,'_blank')">`);
}
function showBotAnswer(text){
  const hasMeal = /\[\[MEAL\]\]/.test(text);
  let t = processImgs(text.replace(/\[\[MEAL\]\]/g,'').trim());
  addMsg(t, 'bot');
  if(hasMeal) appendMeal();
}
function appendMeal(){
  const load=document.createElement('div'); load.className='msg bot';
  load.innerHTML='🍚 오늘의 급식 메뉴를 불러오는 중...<span class="stamp">'+now()+'</span>';
  body.appendChild(load); scroll();
  if(!window.Neis){ load.remove(); return; }
  Neis.getNextMeal().then(res=>{
    load.remove();
    if(!res || !res.meals.length){ addMsg('지금은 등록된 급식 정보가 없어요(주말·방학일 수 있어요). 🍽️','bot'); return; }
    let html='🍚 <b>'+res.dateLabel+' 급식</b>';
    res.meals.forEach(m=>{ html+='\n\n<b>['+m.type+']</b>\n'+m.menu; });
    addMsg(html,'bot');
  }).catch(()=>{ load.remove(); addMsg('급식 정보를 불러오지 못했어요. 😢 잠시 후 다시 시도해 주세요.','bot'); });
}

/* 1단계: 유형 선택 화면 */
function showCategories(){
  clearChoices();
  addLabel('▌ 궁금한 유형을 골라보세요');
  CATS.forEach(cat=>{
    addChip(`${cat.icon} ${cat.title}`, 'cat', ()=>openCategory(cat));
  });
}

/* 2단계: 유형 안 질문 선택 */
function openCategory(cat){
  addMsg(`${cat.icon} <b>${cat.title}</b>`, 'user');
  typing(()=>{
    addMsg(`'${cat.title}'에 대해 자주 묻는 질문이에요. 궁금한 걸 골라보세요! 👇`, 'bot');
    clearChoices();
    addLabel(`▌ ${cat.icon} ${cat.title}`);
    cat.items.forEach(it=>{
      addChip(it.q, '', ()=>askQuestion(cat, it));
    });
    addChip('↩ 다른 유형 보기', 'back', showCategories);
  });
}

/* 3단계: 답변 */
function askQuestion(cat, it){
  addMsg(it.q, 'user');
  typing(()=>{
    showBotAnswer(it.a);
    clearChoices();
    addLabel(`▌ ${cat.icon} ${cat.title} · 더 궁금한 점`);
    cat.items.filter(x=>x!==it).forEach(x=>{
      addChip(x.q, '', ()=>askQuestion(cat, x));
    });
    addChip('↩ 다른 유형 보기', 'back', showCategories);
  });
}

/* ── 직접 입력 → 키워드 매칭 ── */
const askForm = document.getElementById('askForm');
const askInput = document.getElementById('askInput');

// 인사/감사 간단 응답
const GREET=["안녕","안뇽","하이","hi","hello","ㅎㅇ","반가","누구","시작"];
const THANKS=["고마","감사","ㄳ","thank","고맙"];

function norm(s){ return s.toLowerCase().replace(/[\s?!.,~·]/g,''); }
// 띄어쓰기/구두점 기준으로 단어 토큰 추출 (2글자 이상)
function words(s){ return (s.toLowerCase().match(/[가-힣a-z0-9]{2,}/g)||[]); }
// 두 단어가 서로 포함관계면 매칭 (한국어 조사 흡수: "학교"⊂"학교만의")
function matchScore(qWords, tokenList){
  let sc=0;
  tokenList.forEach(t=>{
    for(const w of qWords){
      if(t.includes(w) || w.includes(t)){ sc+=Math.min(t.length,w.length); break; }
    }
  });
  return sc;
}

// 짧은말·은어 → 정식 키워드 보강
const SYN = [["밥","급식 메뉴"],["돈","학비 등록금"],["폰","휴대폰"],["여자","여학생"],
  ["남자","남학생"],["군대","병역 부사관 산업기능요원"],["월급","초봉 연봉 취업"],
  ["기숙","기숙사"],["버스","통학버스"],["자랑","장점"],["좋은","장점"],["왜","장점 이유"],
  ["취직","취업"],["대학","진학"],["동방","동아리"],["면허","자격증"]];
function expand(query){
  let qx = query;
  SYN.forEach(([k,v])=>{ if(query.includes(k)) qx += " " + v; });
  return qx;
}

// 입력 문장과 각 Q&A 항목의 점수 계산
function findAnswer(query){
  const qx = expand(query);
  const q = norm(qx);
  if(GREET.some(g=>norm(query).includes(g))) return {a:"안녕하세요! 👋 저는 경북기계금속고 안내봇 <b>'기금이'</b>예요. 궁금한 걸 입력하거나 아래 버튼을 눌러보세요!"};
  if(THANKS.some(g=>norm(query).includes(g))) return {a:"도움이 됐다니 기뻐요! 😊 더 궁금한 게 있으면 언제든 물어보세요."};

  const qWords = words(qx);
  let best=null, score=0;
  CATS.forEach(cat=>{
    const catWords = words(cat.title);
    cat.items.forEach(it=>{
      // 질문 단어(가중치 2배) + 카테고리 + 답변 일부 단어로 점수
      let sc = matchScore(qWords, words(it.q))*2
             + matchScore(qWords, catWords)
             + matchScore(qWords, words(it.a).slice(0,40));
      if(sc>score){ score=sc; best={cat,it}; }
    });
  });
  if(best && score>=2) return {a:best.it.a, cat:best.cat, it:best.it};
  return null;
}

function handleAsk(text){
  addMsg(text,'user');
  const res = findAnswer(text);
  typing(()=>{
    if(res){
      showBotAnswer(res.a);
      if(res.cat){
        clearChoices();
        addLabel(`▌ ${res.cat.icon} ${res.cat.title} · 관련 질문`);
        res.cat.items.filter(x=>x!==res.it).forEach(x=>addChip(x.q,'',()=>askQuestion(res.cat,x)));
        addChip('↩ 다른 유형 보기','back',showCategories);
      }
    } else {
      addMsg("음, 그건 제가 아직 정확히 몰라요. 🤔\n아래 유형 버튼에서 찾아보거나, 정확한 답은 <b>행정실 053-859-3800</b> 또는 <a href='https://gbgigo.com' target='_blank'>gbgigo.com</a>에서 확인해 주세요!",'bot');
      showCategories();
    }
  });
}

askForm.addEventListener('submit',e=>{
  e.preventDefault();
  const v=askInput.value.trim();
  if(!v) return;
  askInput.value='';
  handleAsk(v);
});

function start(){
  body.innerHTML='';
  addMsg("안녕하세요! 👋 경북기계금속고 안내봇 <b>'기금이'</b>예요.\n아래 유형을 고르거나, <b>직접 입력</b>해서 물어봐도 돼요! 😊", 'bot');
  showCategories();
}
resetBtn.onclick=start;

/* 지식 데이터 로드 후 시작 */
let CATS = [];
KB.load().then(cats=>{ CATS = cats; start(); })
  .catch(()=>{
    body.innerHTML='';
    addMsg("⚠️ 데이터를 불러오지 못했어요.\n로컬에서 보려면 같은 폴더에 kb.js가 있어야 하고, 인터넷(GitHub Pages)에서는 정상 작동해요.", 'bot');
  });
</script>
</body>
</html>
