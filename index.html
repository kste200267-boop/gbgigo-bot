<script>
const body = document.getElementById('body');
const navList = document.getElementById('navList');
const resetBtn = document.getElementById('resetBtn');

function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');}
function scroll(){body.scrollTop=body.scrollHeight;}

function addMsg(html, who){
  const m=document.createElement('div');
  m.className='msg '+who;
  m.innerHTML=html+`<span class="stamp">${now()}</span>`;
  body.appendChild(m); scroll();
}
function typing(cb){
  const t=document.createElement('div');
  t.className='typing'; t.innerHTML='<i></i><i></i><i></i>';
  body.appendChild(t); scroll();
  setTimeout(()=>{ t.remove(); cb(); }, 420+Math.random()*380);
}

/* 답변 내 특수 마커 처리: [[IMG:파일]] = 사진,  [[MEAL]] = 실시간 급식 */
function processImgs(html){
  return html.replace(/\[\[IMG:([^\]]+)\]\]/g, (m,f)=>
    `<img class="msg-img" src="img/${f.trim()}" alt="학교 사진" loading="lazy" onclick="window.open(this.src,'_blank')">`);
}
function showBotAnswer(text){
  const hasMeal = /\[\[MEAL\]\]/.test(text);
  let t = processImgs(text.replace(/\[\[MEAL\]\]/g,'').trim());
  addMsg(t, 'bot');
  if(hasMeal) appendMeal();
}
function appendMeal(){
  const load=document.createElement('div'); load.className='msg bot';
  load.innerHTML='🍚 오늘의 급식 메뉴를 불러오는 중...<span class="stamp">'+now()+'</span>';
  body.appendChild(load); scroll();
  if(!window.Neis){ load.remove(); return; }
  Neis.getNextMeal().then(res=>{
    load.remove();
    if(!res || !res.meals.length){ addMsg('지금은 등록된 급식 정보가 없어요(주말·방학일 수 있어요). 🍽️','bot'); return; }
    let html='🍚 <b>'+res.dateLabel+' 급식</b>';
    res.meals.forEach(m=>{ html+='\n\n<b>['+m.type+']</b>\n'+m.menu; });
    addMsg(html,'bot');
  }).catch(()=>{ load.remove(); addMsg('급식 정보를 불러오지 못했어요. 😢 잠시 후 다시 시도해 주세요.','bot'); });
}

/* 오른쪽 패널: 유형(아코디언) 만들기 — 누르면 아래로 질문이 펼쳐짐 */
function buildNav(){
  navList.innerHTML='';
  CATS.forEach(cat=>{
    const box=document.createElement('div'); box.className='cat';
    const btn=document.createElement('button'); btn.className='cat-btn';
    btn.innerHTML=`<span>${cat.icon}</span> ${cat.title} <span class="arr">▶</span>`;
    const sub=document.createElement('div'); sub.className='sub';
    cat.items.forEach(it=>{
      const q=document.createElement('button'); q.className='q'; q.textContent=it.q;
      q.onclick=()=>askQuestion(cat, it);
      sub.appendChild(q);
    });
    btn.onclick=()=>{
      const wasOpen=box.classList.contains('open');
      navList.querySelectorAll('.cat.open').forEach(c=>c.classList.remove('open'));
      if(!wasOpen){
        box.classList.add('open');
        setTimeout(()=>box.scrollIntoView({behavior:'smooth', block:'nearest'}), 60);
      }
    };
    box.appendChild(btn); box.appendChild(sub);
    navList.appendChild(box);
  });
}

/* 질문 클릭 → 왼쪽 채팅에 답변 */
function askQuestion(cat, it){
  addMsg(it.q, 'user');
  typing(()=>{ showBotAnswer(it.a); });
}

/* ── 직접 입력 → 키워드 매칭 ── */
const askForm = document.getElementById('askForm');
const askInput = document.getElementById('askInput');

// 인사/감사/장난 응답
const GREET=["안녕","안뇽","하이","hi","hello","ㅎㅇ","반가","누구","시작"];
const THANKS=["고마","감사","ㄳ","thank","고맙"];
const BAD=["바보","멍청","꺼져","죽어","시발","씨발","ㅅㅂ","개새","병신","ㅂㅅ","ㅄ","닥쳐","욕"];

function norm(s){ return s.toLowerCase().replace(/[\s?!.,~·]/g,''); }
// 띄어쓰기/구두점 기준으로 단어 토큰 추출 (2글자 이상)
function words(s){ return (s.toLowerCase().match(/[가-힣a-z0-9]{2,}/g)||[]); }
// 한국어 조사 제거(어간 추출): "도제가"→"도제", "학교에서"→"학교"
function stem(w){
  for(const j of ['에서','으로','에게','한테','부터','까지','이라','라고']) if(w.endsWith(j)&&w.length-j.length>=2) return w.slice(0,-j.length);
  for(const j of ['은','는','이','가','을','를','의','에','도','만','과','와','나','야','요','로']) if(w.endsWith(j)&&w.length-1>=2) return w.slice(0,-1);
  return w;
}
// 의미 없는 말끝/의문어 (매칭에서 제외)
const STOP=new Set(["보나요","보나","되나요","되나","있어요","있나요","있어","하나요","뭐예요","어때요","어떤가요","어때","어디","뭐야","어떻게","인가요","해요","돼요","나요","가요","가나요","가나","가고","예요","이에요","무엇","무슨","알려","궁금","대해","그리고","근데"]);
// 입력을 단어+어간으로 확장 (말끝 제외)
function qTokens(s){ const out=[]; words(s).forEach(w=>{ const st=stem(w); [w,st].forEach(x=>{ if(x&&x.length>=2&&!STOP.has(x)&&!out.includes(x)) out.push(x); }); }); return out; }
// 문서(질문/답변/유형) 토큰: 단어+어간 (조사 흡수 매칭용)
function docTokens(s){ const out=[]; words(s).forEach(w=>{ [w,stem(w)].forEach(x=>{ if(x&&x.length>=2&&!out.includes(x)) out.push(x); }); }); return out; }
// 거의 모든 질문에 들어가는 흔한 단어 → 약하게(점수 1)
const LOW=new Set(["학교","학생","교육","수업","우리","여기","거기","고등","어떤","무슨","경북",
  "방법","방식","종류","정도","관련","정보","내용","경우","어떻","하는","대해","그냥"]);
// 입력 단어별로 가장 잘 맞는 토큰 1개의 점수만 (흔한 단어는 약하게)
function matchScore(qWords, tokenList){
  let sc=0;
  qWords.forEach(w=>{
    let best=0;
    for(const t of tokenList){
      if(t.includes(w) || w.includes(t)){
        const v = LOW.has(w) ? 1 : Math.min(t.length,w.length);
        if(v>best) best=v;
      }
    }
    sc+=best;
  });
  return sc;
}

// 짧은말·은어 → 정식 키워드 보강
const SYN = [["밥","급식 메뉴 맛"],["맛있","급식"],["맛없","급식"],["돈","학비 등록금"],["공짜","학비 무료"],
  ["폰","휴대폰 규정"],["핸드폰","휴대폰 규정"],["휴대폰","규정"],["폰써","규정"],
  ["여자","여학생"],["남자","남학생"],["남녀","여학생 남녀공학"],["공학","여학생 남녀공학"],
  ["군대","병역 부사관 산업기능요원"],["월급","초봉 연봉 취업"],["연봉","초봉 취업"],
  ["기숙","기숙사"],["버스","통학버스"],["통학","통학버스"],
  ["자랑","장점"],["좋은","장점"],["좋아","장점"],["왜","장점 이유"],
  ["취직","취업"],["대학","진학"],["진학","진학 대학"],["후학습","진학 대학"],["ptech","진학"],["p-tech","진학"],["피텍","진학"],
  ["동방","동아리"],["면허","자격증"],["지게차","자격증"],
  ["다쳐","안전 위험"],["다치","안전 위험"],["다칠","안전 위험"],["위험","안전"],
  ["몇시","일과 시간 등교 하교"],["하교","일과"],["등교","일과"],["야자","일과 야간"],["일과","일과 시간"],
  ["팩토리","스마트제조 스마트팩토리"],["스마트팩토리","스마트제조"],
  ["흡연","규정"],["담배","규정"],["술","규정"],
  ["학폭","학교폭력 안전"],["폭력","학교폭력 안전"],["왕따","학교폭력 안전 상담"],
  ["상담","상담 고민"],["고민","상담"]];
function expand(query){
  let qx = query;
  SYN.forEach(([k,v])=>{ if(query.includes(k)) qx += " " + v; });
  return qx;
}

// 입력 문장과 각 Q&A 항목의 점수 계산
function findAnswer(query){
  const nq = norm(query);
  if(BAD.some(g=>nq.includes(g))) return {a:"앗, 저는 학교 안내봇이라 그런 말엔 약해요 😅 학과·입학·취업·복지 같은 걸 물어봐 주세요!"};
  if(GREET.some(g=>nq.includes(g))) return {a:"안녕하세요! 👋 저는 경북기계금속고등학교 AI 안내봇 <b>'기금이'</b>예요. 궁금한 걸 입력하거나 아래 버튼을 눌러보세요!"};
  if(THANKS.some(g=>nq.includes(g))) return {a:"도움이 됐다니 기뻐요! 😊 더 궁금한 게 있으면 언제든 물어보세요."};

  // 학교 소개 의도 → 소개 답변 직행 (인접 패턴만 정확히)
  const INTRO=["뭐하는학교","뭐하는곳","무슨학교","어떤학교","어떤곳","학교소개","학교설명","이학교뭐","그학교뭐","학교뭐","학교가뭐","학교뭔","뭔학교","학교어때","학교어떤","학교임","여기뭐","여기어떤","학교가어떤"];
  if(INTRO.some(p=>nq.includes(p))){
    for(const cat of CATS) for(const it of cat.items) if(it.q.indexOf("어떤 학교예요")===0) return {a:it.a, cat, it};
  }

  const qWords = qTokens(expand(query));
  if(!qWords.length) return null;
  let best=null, score=0;
  CATS.forEach(cat=>{
    const catWords = docTokens(cat.title);
    cat.items.forEach(it=>{
      // 질문·유형 단어가 먼저 걸려야 인정 (답변 본문은 보조 점수만)
      const qScore = matchScore(qWords, docTokens(it.q))*2 + matchScore(qWords, catWords);
      if(qScore <= 0) return;                         // 질문/유형에 안 걸리면 제외 → 엉뚱한 답 방지
      const aScore = matchScore(qWords, docTokens(it.a).slice(0,40)) * 0.5;
      const sc = qScore + aScore;
      if(sc>score){ score=sc; best={cat,it}; }
    });
  });
  // 2글자 키워드가 질문에 정확히 걸리면 점수 4 이상 → 임계값 4
  if(best && score>=4) return {a:best.it.a, cat:best.cat, it:best.it};
  return null;
}

function handleAsk(text){
  addMsg(text,'user');
  const res = findAnswer(text);
  if(res){
    typing(()=>{ showBotAnswer(res.a); });
    return;
  }
  // 규칙 매칭 실패 → AI(있을 때만) 시도, 실패/한도초과 시 규칙 폴백
  if(window.AI_WORKER_URL){ tryAI(text); }
  else { typing(()=>ruleFallback()); }
}

// 규칙 폴백(기본 안내)
function ruleFallback(){
  addMsg("음, 그건 제가 아직 정확히 몰라요. 🤔\n오른쪽 유형에서 골라보거나, 정확한 답은 <b>교무실 053-859-3891</b> 또는 <a href='https://school.gyo6.net/gbgigo/' target='_blank'>학교 홈페이지</a>에서 확인해 주세요!",'bot');
}

// AI용 컨텍스트: 입력과 가장 관련있는 Q&A 상위 6개
function buildContext(query){
  const qWords=qTokens(expand(query));
  const scored=[];
  CATS.forEach(cat=>cat.items.forEach(it=>{
    const sc=matchScore(qWords,docTokens(it.q))*2+matchScore(qWords,docTokens(it.a).slice(0,60));
    scored.push({it,sc});
  }));
  scored.sort((a,b)=>b.sc-a.sc);
  return scored.slice(0,6).map(x=>`Q:${x.it.q}\nA:${x.it.a.replace(/\[\[[^\]]*\]\]/g,'').trim()}`).join("\n\n");
}

// Cloudflare Workers AI 호출 (실패/한도초과 → 규칙 폴백)
function tryAI(text){
  const load=document.createElement('div'); load.className='typing'; load.innerHTML='<i></i><i></i><i></i>';
  body.appendChild(load); scroll();
  fetch(window.AI_WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({q:text, context:buildContext(text)})})
    .then(r=>r.json())
    .then(d=>{
      load.remove();
      if(d && d.answer){
        addMsg(d.answer+'\n\n<span style="font-size:11px;color:var(--dim)">🤖 AI가 생성한 답변이라 부정확할 수 있어요. 정확한 정보는 교무실(053-859-3891) 확인!</span>','bot');
      } else { ruleFallback(); }   // 한도초과·오류 → 규칙기반
    })
    .catch(()=>{ load.remove(); ruleFallback(); });
}

askForm.addEventListener('submit',e=>{
  e.preventDefault();
  const v=askInput.value.trim();
  if(!v) return;
  askInput.value='';
  handleAsk(v);
});

function start(){
  body.innerHTML='';
  addMsg("안녕하세요! 👋 경북기계금속고등학교 AI 안내봇 <b>'기금이'</b>예요.\n<b>오른쪽 유형</b>을 누르면 질문이 펼쳐져요. 직접 입력해서 물어봐도 돼요! 😊", 'bot');
}
resetBtn.onclick=start;
